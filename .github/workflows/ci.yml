name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: |
          cd backend
          uv sync --dev
          
      - name: Run Bandit (Security Scan)
        run: |
          cd backend
          uv run bandit -r app/
          
      - name: Run Tests (Pytest)
        run: |
          cd backend
          uv run pytest
