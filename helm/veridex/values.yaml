# Veridex Helm Chart Values

global:
  environment: production
  deployDatabases: true

backend:
  replicaCount: 3
  image:
    repository: veridex/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

worker:
  replicaCount: 3
  image:
    repository: veridex/worker
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

frontend:
  replicaCount: 2
  image:
    repository: veridex/frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 3000

opa:
  replicaCount: 1
  image:
    repository: openpolicyagent/opa
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8181

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

config:
  postgresUser: veridex
  postgresDb: veridex_db
  postgresPort: 5432
  redisPort: 6379
  minioUser: minioadmin
