apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
data:
  # In a real production setup, these would be managed by ExternalSecrets or sealed-secrets.
  # For this chart, we're generating dummy base64 values or hardcoding them for local testing.
  POSTGRES_PASSWORD: {{ "veridex_secret" | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ "minioadmin" | b64enc | quote }}
  OPENAI_API_KEY: {{ "your-openai-api-key" | b64enc | quote }}
