{{- if .Values.global.deployDatabases }}
# Postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  serviceName: "{{ .Release.Name }}-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: veridex-postgres
  template:
    metadata:
      labels:
        app: veridex-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-config
              key: POSTGRES_USER
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-config
              key: POSTGRES_DB
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: veridex-postgres

---
# Redis
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
spec:
  serviceName: "{{ .Release.Name }}-redis"
  replicas: 1
  selector:
    matchLabels:
      app: veridex-redis
  template:
    metadata:
      labels:
        app: veridex-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: veridex-redis

---
# Qdrant
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-qdrant
spec:
  serviceName: "{{ .Release.Name }}-qdrant"
  replicas: 1
  selector:
    matchLabels:
      app: veridex-qdrant
  template:
    metadata:
      labels:
        app: veridex-qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333
        - containerPort: 6334
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-qdrant
spec:
  ports:
  - port: 6333
    targetPort: 6333
    name: http
  - port: 6334
    targetPort: 6334
    name: grpc
  selector:
    app: veridex-qdrant

---
# Neo4j
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-neo4j
spec:
  serviceName: "{{ .Release.Name }}-neo4j"
  replicas: 1
  selector:
    matchLabels:
      app: veridex-neo4j
  template:
    metadata:
      labels:
        app: veridex-neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:latest
        env:
        - name: NEO4J_AUTH
          value: "neo4j/veridex_secret" # Hardcoded for demo
        ports:
        - containerPort: 7474
        - containerPort: 7687
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-neo4j
spec:
  ports:
  - port: 7474
    targetPort: 7474
    name: http
  - port: 7687
    targetPort: 7687
    name: bolt
  selector:
    app: veridex-neo4j

---
# MinIO
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-minio
spec:
  serviceName: "{{ .Release.Name }}-minio"
  replicas: 1
  selector:
    matchLabels:
      app: veridex-minio
  template:
    metadata:
      labels:
        app: veridex-minio
    spec:
      containers:
      - name: minio
        image: minio/minio
        command: ["server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-config
              key: MINIO_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: MINIO_ROOT_PASSWORD
        ports:
        - containerPort: 9000
        - containerPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio
spec:
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console
  selector:
    app: veridex-minio

{{- end }}
