policies:
  - id: "require_admin_for_connector"
    name: "Require Admin for Connector Invocation"
    description: "Only users with the admin role can invoke global connectors."
    resource: "connector"
    action: "invoke"
    effect: "allow"
    condition: "'admin' in user.roles"

  - id: "allow_workspace_read"
    name: "Allow Workspace Read"
    description: "Users with read permission on workspace can read workspace."
    resource: "workspace"
    action: "read"
    effect: "allow"
    condition: "user_has_permission(user, 'workspace', 'read')"

  - id: "allow_project_read"
    name: "Allow Project Read"
    description: "Users with read permission on project can read project."
    resource: "project"
    action: "read"
    effect: "allow"
    condition: "user_has_permission(user, 'project', 'read')"

  - id: "allow_project_write"
    name: "Allow Project Write"
    description: "Users with write permission on project can modify project."
    resource: "project"
    action: "write"
    effect: "allow"
    condition: "user_has_permission(user, 'project', 'write')"
